name: Push Release (Optimized)
on: 
  workflow_dispatch:
    inputs:
      tag:
        type: choice
        required: true
        description: 'Dev Build or Full Release tag'
        default: staging
        options:
          - release
          - staging
      release-version:
        description: 'Example: 1.0'
        required: true
        type: string
      description:
        required: false
        type: string
        description: 'Description of changes'
# This permissions section explicitly gives the workflow permission to create releases.
# Most of the time it's not needed to set it, as the default GITHUB_TOKEN permissions
# are permissive enough, but that's not always the case
permissions:
  contents: write
jobs:
  packsquash:
    name: Optimize resource pack
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # A non-shallow repository clone is required
      - name: Run PackSquash
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest
          options: |
            # Optimize the pack in the root repository directory.
            # This is the default value for pack_directory when no PackSquash options are defined
            pack_directory = 'pack'

            # Set a custom output file path to work with the generated ZIP file
            # without needing to download its artifact in a separate step
            output_file_path = '/tmp/LWPack v${{ github.event.inputs.release-version }}.zip'

      - name: Tag and create release
        uses: softprops/action-gh-release@v2
        with:
          body: '${{ github.event.inputs.description }}'
          name: 'v${{ github.event.inputs.release-version }}'
          tag_name: '${{ github.event.inputs.tag }}-${{ github.event.inputs.release-version }}'
          files: '/tmp/LWPack v${{ github.event.inputs.release-version }}.zip'

      - name: Calculate SHA1 and Output
        id: file-sha
        run: |
          # Calculate the SHA1 and trim the resulting hash (stripping out the filename)
          HASH=$(sha1sum '/tmp/LWPack v${{ github.event.inputs.release-version }}.zip' | awk '{ print $1 }')
          
          # Store the hash in the GITHUB_OUTPUT environment file
          echo "file_sha1=$HASH" >> $GITHUB_OUTPUT

      - name: Use the SHA1 Output
        run: |
          echo "The SHA1 hash is: ${{ steps.file-sha.outputs.file_sha1 }}"